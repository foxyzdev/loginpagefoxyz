<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foxyz Server - Login</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container">
    <div class="box">
        <h1 class="title">Foxyz <span>Server</span></h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Registrar</button>
        </div>

        <!-- Formulário de Login -->
        <form id="loginForm" class="form active">
            <div class="input-group">
                <label>Usuário (e-mail)</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" required />
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn">Entrar</button>
            <p id="loginMessage" class="message"></p>
        </form>

        <!-- Formulário de Registro -->
        <form id="registerForm" class="form">
            <div class="input-group">
                <label>Nick (nome do jogo)</label>
                <input type="text" id="registerNick" placeholder="SeuNick" required minlength="3" maxlength="20" />
            </div>
            <div class="input-group">
                <label>Usuário (e-mail)</label>
                <input type="email" id="registerEmail" placeholder="seu@email.com" required />
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
            </div>
            <button type="submit" class="btn">Criar conta</button>
            <p id="registerMessage" class="message"></p>
        </form>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
